<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Império do Cuscuz | O Rei do Sabor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --amber: #FFBF00;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --text: #ffffff;
            --muted: #a0a0a0;
            --green: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text); overflow-x: hidden; }

        /* HEADER & NAV */
        header { padding: 40px 5%; text-align: center; background: linear-gradient(to bottom, #1a1a1a, var(--dark-bg)); }
        .logo-area img { width: 120px; filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3)); margin-bottom: 15px; }
        h1 { font-family: 'Bebas Neue'; font-size: 3.5rem; color: var(--gold); letter-spacing: 2px; }

        .nav-filters { display: flex; justify-content: center; gap: 10px; margin: 30px 0; flex-wrap: wrap; }
        .filter-btn { 
            background: transparent; border: 1px solid #333; color: var(--text); padding: 8px 20px; 
            border-radius: 50px; cursor: pointer; transition: 0.3s; font-size: 14px;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--gold); color: black; border-color: var(--gold); font-weight: 600; }

        /* MENU GRID */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px 5%; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .product-card { 
            background: var(--card-bg); border-radius: 20px; padding: 20px; border: 1px solid #222;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative;
        }
        .product-card:hover { transform: translateY(-10px); border-color: var(--amber); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .product-img { width: 100%; height: 200px; background: #222; border-radius: 15px; object-fit: cover; margin-bottom: 15px; }
        .product-card h3 { font-size: 1.2rem; margin-bottom: 8px; color: var(--gold); }
        .product-card p { font-size: 0.85rem; color: var(--muted); line-height: 1.5; margin-bottom: 15px; }
        .price-tag { font-weight: 800; font-size: 1.3rem; color: #fff; }

        /* BUILDER SECTION (MONTE SEU) */
        .builder-section { background: #111; padding: 60px 5%; margin: 50px 0; border-radius: 40px; }
        .builder-card { background: var(--dark-bg); border: 2px solid var(--gold); border-radius: 30px; padding: 30px; max-width: 700px; margin: 0 auto; }
        .step-title { font-family: 'Bebas Neue'; color: var(--gold); font-size: 1.8rem; margin: 20px 0 10px; border-bottom: 1px solid #333; }
        .option-item { 
            display: flex; align-items: center; justify-content: space-between; background: #1a1a1a;
            padding: 12px 20px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent;
        }
        .option-item:hover { border-color: #444; }
        .option-item input { accent-color: var(--gold); width: 20px; height: 20px; }

        .total-display { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-top: 30px; padding-top: 20px; border-top: 2px dashed #333;
        }
        .btn-order { 
            background: var(--green); color: white; border: none; padding: 15px 30px; 
            border-radius: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem;
        }

        /* FLOAT BUTTON */
        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px; background: var(--green);
            width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center;
            align-items: center; color: white; font-size: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.4); z-index: 999;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>IMPÉRIO DO CUSCUZ</h1>
            <p style="color: var(--gold); letter-spacing: 3px; font-size: 12px;">SABOR REAL EM ILHÉUS</p>
        </div>

        <div class="nav-filters">
            <button class="filter-btn active" onclick="filterMenu('todos')">Todos</button>
            <button class="filter-btn" onclick="filterMenu('salgados')">Salgados</button>
            <button class="filter-btn" onclick="filterMenu('doces')">Doces</button>
            <button class="filter-btn" onclick="filterMenu('bebidas')">Bebidas</button>
        </div>
    </header>

    <div class="container">
        <div class="menu-grid" id="menu-container">
            </div>

        <div class="builder-section" id="customizar">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="font-family: 'Bebas Neue'; font-size: 3rem; color: #fff;">Monte seu Império</h2>
                <p style="color: var(--muted);">Escolha seus ingredientes favoritos</p>
            </div>
            
            <div class="builder-card">
                <div class="step-title">1. A Base</div>
                <label class="option-item">
                    <span>Cuscuz Tradicional de Milho</span>
                    <input type="radio" name="base" value="10.00" data-name="Tradicional" checked onchange="calcTotal()">
                </label>
                <label class="option-item">
                    <span>Cuscuz Temperado (Cebola/Pimentão)</span>
                    <input type="radio" name="base" value="13.00" data-name="Temperado" onchange="calcTotal()">
                </label>

                <div class="step-title">2. Adicionais (Recheio)</div>
                <label class="option-item">
                    <span>Carne de Sol (+R$ 7,00)</span>
                    <input type="checkbox" class="extra" value="7.00" data-name="Carne de Sol" onchange="calcTotal()">
                </label>
                <label class="option-item">
                    <span>Queijo Coalho (+R$ 5,00)</span>
                    <input type="checkbox" class="extra" value="5.00" data-name="Queijo Coalho" onchange="calcTotal()">
                </label>
                <label class="option-item">
                    <span>Ovo Frito (+R$ 3,00)</span>
                    <input type="checkbox" class="extra" value="3.00" data-name="Ovo Frito" onchange="calcTotal()">
                </label>

                <div class="total-display">
                    <span style="color: var(--muted);">Total Estimado:</span>
                    <span class="price-tag">R$ <span id="total-val">10,00</span></span>
                </div>

                <button class="btn-order" onclick="enviarPedidoCustom()">
                    <i class="fa-brands fa-whatsapp"></i> PEDIR AGORA
                </button>
            </div>
        </div>
    </div>

    <a href="https://wa.me/557391731767" class="whatsapp-float" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        const produtos = [
            { name: "Cuscuz Sertanejo", desc: "Carne de sol, queijo coalho e manteiga de garrafa.", price: "22,90", cat: "salgados" },
            { name: "Cuscuz Nordestino", desc: "Ovo frito, queijo mussarela e calabresa acebolada.", price: "18,90", cat: "salgados" },
            { name: "Cuscuz Imperial", desc: "Leite de coco fresco, queijo coalho e coco ralado.", price: "16,00", cat: "doces" },
            { name: "Café com Leite", desc: "Acompanhamento perfeito para o seu cuscuz.", price: "5,00", cat: "bebidas" }
        ];

        function loadMenu(category = 'todos') {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            
            const filtered = category === 'todos' ? produtos : produtos.filter(p => p.cat === category);

            filtered.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <div class="product-img" style="background: url('https://via.placeholder.com/300x200/222/FFD700?text=Cuscuz') center/cover"></div>
                        <h3>${p.name}</h3>
                        <p>${p.desc}</p>
                        <div class="price-tag">R$ ${p.price}</div>
                    </div>
                `;
            });
        }

        function filterMenu(cat) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadMenu(cat);
        }

        function calcTotal() {
            let total = parseFloat(document.querySelector('input[name="base"]:checked').value);
            document.querySelectorAll('.extra:checked').forEach(e => total += parseFloat(e.value));
            document.getElementById('total-val').innerText = total.toFixed(2).replace('.', ',');
        }

        function enviarPedidoCustom() {
            const base = document.querySelector('input[name="base"]:checked').dataset.name;
            const extras = Array.from(document.querySelectorAll('.extra:checked')).map(e => e.dataset.name).join(', ');
            const total = document.getElementById('total-val').innerText;
            const msg = `👑 *Pedido Império do Cuscuz*%0A- Base: ${base}%0A- Adicionais: ${extras || 'Nenhum'}%0A*Total: R$ ${total}*`;
            window.open(`https://wa.me/557391731767?text=${msg}`, '_blank');
        }

        // Inicializar
        loadMenu();
    </script>
</body>
</html>
